services:

  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      - FLOCI_HOSTNAME=floci
      - FLOCI_STORAGE_MODE=hybrid
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  floci-init:
    image: floci/floci:latest-compat
    depends_on:
      floci:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws dynamodb create-table \
          --table-name urlsnip \
          --attribute-definitions AttributeName=code,AttributeType=S \
          --key-schema AttributeName=code,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://floci:4566 \
          --region us-east-1 && \
        aws sqs create-queue \
          --queue-name urlsnip-events \
          --endpoint-url http://floci:4566 \
          --region us-east-1 && \
        echo 'AWS resources created'

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  shortener:
    build: ./services/shortener-service
    ports:
      - "8000:8000"
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DYNAMODB_TABLE=urlsnip
      - SQS_QUEUE_URL=http://floci:4566/000000000000/urlsnip-events
    depends_on:
      floci-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  redirect:
    build: ./services/redirect-service
    ports:
      - "8001:8001"
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DYNAMODB_TABLE=urlsnip
    depends_on:
      floci-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  analytics:
    build: ./services/analytics-service
    ports:
      - "8002:8002"
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_TABLE=urlsnip
      - SQS_QUEUE_URL=http://floci:4566/000000000000/urlsnip-events
    depends_on:
      floci-init:
        condition: service_completed_successfully